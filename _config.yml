# Site settings
course_name: Courses
course_description: "Description"
course_semester: ""

baseurl: "/courses" # the subpath of your site, e.g. /blog/
url: "http://tofighi.github.io/" # the base hostname & protocol for your site

schoolname: "ABC"
schoolurl: "https://ghassem.com"
twitter_username: tofighi 

address: |
    Toronto, Canada 

# Set your Google Analytics tracking ID (set up yours at http://www.google.com/analytics/)
# google_analytics: UA-XXXXXXXX-X

### Do not change the followings unless you know what you are doing ###

# Build settings
markdown: kramdown

# Other options
permalink: blog/:year/:month/:title
excerpt_separator: "<!--more-->"

include: ['_images', '_css']
exclude: ['develop']

dateformat: "%m/%d/%Y"

future: true
collections:
    events:
        output: true
    lectures:
        output: true
    assignments:
        output: true
    announcements:
        output: false


defaults:
  - scope:
      path: ""
      type: "assignments"
    values:
      layout: "assignment"
